name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (server)
        run: npm ci
        working-directory: ./server

      - name: Install dependencies (client)
        run: npm ci
        working-directory: ./client

      - name: Lint server
        run: npm run lint
        working-directory: ./server

      - name: Lint client
        run: npm run lint
        working-directory: ./client

      - name: Typecheck server
        run: npm run build
        working-directory: ./server

      - name: Typecheck client
        run: npx tsc --noEmit
        working-directory: ./client

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (server)
        run: npm ci
        working-directory: ./server

      - name: Run server tests
        run: npm run test:run
        working-directory: ./server

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (client)
        run: npm ci
        working-directory: ./client

      - name: Build client
        run: npm run build
        working-directory: ./client
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
